{{ define "main" }}
  <main style="text-align:center; padding-top: 100px;">
    <img src="/images/logo.png" alt="Practivio Logo" style="width:100px; margin-bottom:20px;">
    <h1 style="font-size: 2.5rem; font-weight: 700; margin: 0;">Practivio</h1>
    <p style="font-size: 1.25rem; margin-top: 10px;">Shop Smart. Live Better.</p>
    <form action="/search" method="get" style="margin-top: 30px;">
      <input type="text" name="q" placeholder="Search..." style="width: 300px; padding: 10px; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc;">
    </form>
  </main>
{{ end }}
