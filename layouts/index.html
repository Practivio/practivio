<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Practivio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 100px;
      margin: 0;
      background-color: #ffffff;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .logo-row img {
      width: 80px;
      height: auto;
    }

    .logo-row h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0;
    }

    p {
      font-size: 1.25rem;
      margin-top: 0;
      color: #333;
    }

    input[type="text"] {
      width: 300px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 30px;
      text-align: center;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="logo-row">
    <img src="/logo3.png" alt="Practivio Logo">
    <h1>Practivio</h1>
  </div>

  <p>Shop Smart. Live Better.</p>

  <form action="/search" method="get">
    <input type="text" name="q" placeholder="Search...">
  </form>

  <button onclick="window.location.href='/top-picks';">Browse Top Picks</button>
</body>
</html>
