<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Practivio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

  <!-- Google Font: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      margin: 0;
      background-color: #ffffff;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .logo-row img {
      width: 60px;
      height: auto;
    }

    .logo-row h1 {
      font-size: clamp(2rem, 5vw, 2.5rem);
      font-weight: 700;
      margin: 0;
    }

    p {
      font-size: 1.25rem;
      margin-top: 0;
      color: #555;
    }

    form {
      margin-top: 30px;
      width: 100%;
      max-width: 320px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #ddd;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: box-shadow 0.2s ease;
    }

    input[type="text"]:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      border-color: #2563eb;
    }

    @media (max-width: 480px) {
      .logo-row {
        flex-direction: column;
        gap: 12px;
      }

      .logo-row h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1.125rem;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="logo-row">
    <img src="/logo3.png" alt="Practivio Logo">
    <h1>Practivio</h1>
  </div>

  <p>Shop Smart. Live Better.</p>

  <form action="/search" method="get">
    <input type="text" name="q" placeholder="Search...">
  </form>
</body>
</html>
