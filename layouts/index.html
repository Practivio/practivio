<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Practivio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 100px;
      margin: 0;
    }
    img {
      width: 100px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0;
    }
    p {
      font-size: 1.25rem;
      margin-top: 10px;
    }
    input[type="text"] {
      width: 300px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <img src="/logo.png" alt="Practivio Logo">
  <h1>Practivio</h1>
  <p>Shop Smart. Live Better.</p>
  <form action="/search" method="get">
    <input type="text" name="q" placeholder="Search...">
  </form>
</body>
</html>
